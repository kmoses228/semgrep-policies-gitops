# Apply as soon as a change merges to main. The repo is the source of
# truth, so a merge is the only event that should write to the deployment;
# drift detection runs separately and read-only (see drift.yml).
#
# The reconciler reads a fresh state_version before each PUT, so a change
# made in the Semgrep UI between merge and apply surfaces as a conflict
# rather than being silently overwritten.
name: apply

on:
  push:
    branches: [main]
    paths:
      - "policies/**"
      - "reconciler/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Never let two applies race; a stale etag would 409 anyway, but this
  # avoids the wasted run.
  group: semgrep-policies-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen
      - name: Apply
        env:
          SEMGREP_API_TOKEN: ${{ secrets.SEMGREP_API_TOKEN }}
          SEMGREP_DEPLOYMENT_ID: ${{ vars.SEMGREP_DEPLOYMENT_ID }}
          # Defaults to https://semgrep.dev when the variable is unset.
          SEMGREP_APP_URL: ${{ vars.SEMGREP_APP_URL }}
        run: uv run python -m reconciler.cli apply --deployment-id "$SEMGREP_DEPLOYMENT_ID"
